```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر احترافي</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:tahoma;background:#f6f6f6}

/* HEADER */
header{
display:flex;align-items:center;gap:10px;
padding:10px;background:#fff;position:sticky;top:0;
box-shadow:0 2px 10px #0001;
}

.search{flex:1}
.search input{
width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;
}

.iconBtn{cursor:pointer;font-size:20px}

.badge{
position:absolute;background:red;color:#fff;
width:18px;height:18px;border-radius:50%;
font-size:12px;display:flex;align-items:center;justify-content:center;
top:-5px;left:-5px;
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;border-radius:12px;overflow:hidden;
box-shadow:0 4px 12px #0002;cursor:pointer;
transition:.2s;
}

.card:hover{transform:scale(1.03)}

.card img{width:100%;height:140px;object-fit:cover}

.card .p{padding:10px;font-weight:bold}

/* CART */
.overlay{
position:fixed;inset:0;background:#0006;display:none
}

.cartBox{
position:absolute;right:0;top:0;width:80%;height:100%;
background:#fff;padding:10px;overflow:auto
}

/* LOGIN */
.login{
position:fixed;inset:0;background:#0007;
display:none;align-items:center;justify-content:center
}

.loginBox{
background:#fff;padding:15px;border-radius:10px;width:90%
}

/* MODAL */
.modal{
position:fixed;inset:0;background:#0007;display:none;
align-items:center;justify-content:center
}

.modalBox{
background:#fff;width:90%;border-radius:10px;padding:10px
}

button{
background:#0a7cff;color:#fff;border:none;
padding:10px;border-radius:8px;cursor:pointer;margin:3px
}
</style>
</head>

<body>

<header>
<div class="iconBtn" onclick="openLogin()">👤</div>

<div class="search">
<input id="search" placeholder="ابحث عن منتج">
</div>

<div style="position:relative" onclick="openCart()">
🛒
<div class="badge" id="count">0</div>
</div>
</header>

<div class="grid" id="grid"></div>

<!-- CART -->
<div class="overlay" id="cartOverlay">
<div class="cartBox">
<h3>السلة</h3>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="checkout()">إتمام الطلب</button>
<button onclick="closeCart()">إغلاق</button>
</div>
</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
<div class="loginBox">
<h3>تسجيل دخول</h3>
<input id="email" placeholder="الإيميل"><br><br>
<input id="pass" type="password" placeholder="كلمة المرور"><br><br>
<button onclick="signIn()">دخول</button>
<button onclick="signUp()">تسجيل</button>
<button onclick="closeLogin()">إغلاق</button>
</div>
</div>

<!-- PRODUCT -->
<div class="modal" id="modal">
<div class="modalBox">
<img id="mImg" style="width:100%;height:180px;object-fit:cover"><br>
<h3 id="mName"></h3>
<p id="mPrice"></p>
<button onclick="addCart()">إضافة للسلة</button>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

<script>

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
databaseURL: "XXX",
projectId: "XXX",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* عناصر */
const grid = document.getElementById("grid");
const cartItems = document.getElementById("cartItems");
const count = document.getElementById("count");
const totalEl = document.getElementById("total");

/* بيانات */
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let currentProduct = null;

/* تحميل السلة */
count.innerText = cart.length;
renderCart();

/* AUTH */
function signIn(){
auth.signInWithEmailAndPassword(email.value, pass.value)
.then(()=>alert("تم الدخول"))
.catch(e=>alert(e.message));
}

function signUp(){
auth.createUserWithEmailAndPassword(email.value, pass.value)
.then(()=>alert("تم التسجيل"))
.catch(e=>alert(e.message));
}

/* PRODUCTS */
function loadProducts(){
db.ref("products").on("value",snap=>{
grid.innerHTML="";
snap.forEach(s=>{
let p = s.val();

grid.innerHTML += `
<div class="card" onclick='openProduct(${JSON.stringify(p)})'>
<img src="${p.img}">
<div class="p">
<div>${p.name}</div>
<div>${p.price} ريال</div>
<button onclick='event.stopPropagation();addDirect(${JSON.stringify(p)})'>🛒</button>
</div>
</div>`;
});
});
}

auth.onAuthStateChanged(loadProducts);

/* SEARCH */
search.oninput = function(){
let val = this.value.toLowerCase();

db.ref("products").once("value",snap=>{
grid.innerHTML="";
snap.forEach(s=>{
let p = s.val();
if(p.name.toLowerCase().includes(val)){
grid.innerHTML += `
<div class="card" onclick='openProduct(${JSON.stringify(p)})'>
<img src="${p.img}">
<div class="p">
<div>${p.name}</div>
<div>${p.price} ريال</div>
</div>
</div>`;
}
});
});
};

/* PRODUCT */
function openProduct(p){
currentProduct = p;
modal.style.display="flex";
mImg.src = p.img;
mName.innerText = p.name;
mPrice.innerText = p.price + " ريال";
}

function closeModal(){
modal.style.display="none";
}

/* CART */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function addCart(){
cart.push(currentProduct);
saveCart();
updateCart();
closeModal();
}

function addDirect(p){
cart.push(p);
saveCart();
updateCart();
}

function removeItem(i){
cart.splice(i,1);
saveCart();
updateCart();
}

function getTotal(){
let t=0;
cart.forEach(p=>t+=Number(p.price));
return t;
}

function updateCart(){
count.innerText = cart.length;
renderCart();
}

function renderCart(){
cartItems.innerHTML="";
cart.forEach((p,i)=>{
cartItems.innerHTML += `
<p>${p.name} - ${p.price} ريال
<button onclick="removeItem(${i})">❌</button>
</p>`;
});

totalEl.innerText = "الإجمالي: " + getTotal() + " ريال";
}

/* ORDER */
function checkout(){

if(!auth.currentUser){
alert("سجل دخول أولاً");
return;
}

db.ref("orders").push({
user: auth.currentUser.email,
cart: cart,
total: getTotal(),
date: Date.now()
});

cart = [];
saveCart();
updateCart();

alert("تم الطلب ✅");
}

/* UI */
function openCart(){cartOverlay.style.display="block";}
function closeCart(){cartOverlay.style.display="none";}
function openLogin(){loginBox.style.display="flex";}
function closeLogin(){loginBox.style.display="none";}

</script>

</body>
</html>
```
