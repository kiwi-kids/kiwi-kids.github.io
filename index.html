<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f2f2f2;
}

/* الهيدر */
.header{
  background:#f5c400;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
}

.search{
  flex:1;
  display:flex;
  background:white;
  border-radius:20px;
  padding:8px;
  align-items:center;
}

.search input{
  border:none;
  outline:none;
  width:100%;
}

.icon{
  font-size:22px;
  padding:5px;
}

.cart-badge{
  position:relative;
}

.badge{
  position:absolute;
  top:-5px;
  left:-5px;
  background:red;
  color:white;
  border-radius:50%;
  font-size:12px;
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* بانر */
.banner{
  margin:10px;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

/* المنتجات */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.card .info{
  padding:8px;
}

.price{
  color:#c0392b;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:8px;
  background:#f5c400;
  border:none;
  border-radius:8px;
}

/* تسجيل الدخول */
.login{
  position:fixed;
  top:0;
  right:0;
  left:0;
  bottom:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:white;
  padding:15px;
  border-radius:12px;
  width:80%;
}

.login-box input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.login-btn{
  background:#f5c400;
  width:100%;
  padding:10px;
  border:none;
}

/* سلة */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<!-- تسجيل الدخول -->
<div class="login" id="login">
  <div class="login-box">
    <h3>تسجيل دخول</h3>
    <input type="email" placeholder="الإيميل">
    <input type="password" placeholder="كلمة المرور">
    <button class="login-btn" onclick="document.getElementById('login').style.display='none'">
      دخول
    </button>
  </div>
</div>

<!-- الهيدر -->
<div class="header">
  <div class="icon">☰</div>

  <div class="search">
    🔍
    <input placeholder="ابحث عن المنتجات">
  </div>

  <div class="cart-badge">
    🛒
    <div class="badge" id="count">0</div>
  </div>
</div>

<!-- بانر -->
<div class="banner">
  <img src="https://via.placeholder.com/500x180" width="100%">
</div>

<!-- المنتجات -->
<div class="grid" id="grid"></div>

<!-- السلة -->
<div class="cart">
  🛒 المجموع: <span id="total">0</span> ريال
</div>

<script>
let cart = [];

let products = [
  {name:"فستان بناتي",price:120,img:"https://via.placeholder.com/200"},
  {name:"حذاء أطفال",price:150,img:"https://via.placeholder.com/200"},
  {name:"دمية",price:80,img:"https://via.placeholder.com/200"},
];

function load(){
  let box = document.getElementById("grid");

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="info">
          <h4>${p.name}</h4>
          <div class="price">${p.price} ريال</div>
          <button class="btn" onclick="add(${i})">عرض المنتج</button>
        </div>
      </div>
    `;
  });
}

function add(i){
  cart.push(products[i]);
  document.getElementById("count").innerText = cart.length;

  let total = 0;
  cart.forEach(p=> total += p.price);

  document.getElementById("total").innerText = total;
}

load();
</script>

</body>
</html>
