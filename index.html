<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Ultimate Pro Max</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
text-align:center;
}

header{
background:linear-gradient(135deg,#ff6a88,#ff99ac);
color:white;
padding:15px;
font-size:18px;
font-weight:bold;
}

#search{
width:85%;
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* منتجات */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:170px;
background:white;
margin:10px;
padding:10px;
border-radius:15px;
box-shadow:0 0 10px #ddd;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:7px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add{background:#ff69b4;color:white}
.del{background:red;color:white}

/* أدمن */
#admin{
display:none;
background:white;
margin:10px;
padding:10px;
border-radius:12px;
box-shadow:0 0 10px #ddd;
}

/* سلة */
#cartBox{
position:fixed;
bottom:10px;
left:10px;
width:260px;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 0 10px #ccc;
font-size:13px;
max-height:300px;
overflow:auto;
}

/* واتساب */
.whatsapp{
position:fixed;
bottom:10px;
right:10px;
background:#25D366;
color:white;
padding:12px;
border-radius:50px;
text-decoration:none;
}

/* نافذة */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

#modalContent{
background:white;
width:300px;
margin:120px auto;
padding:15px;
border-radius:15px;
}
</style>
</head>

<body>

<header>🛍️ Kiwi Kids Ultimate Pro Max</header>

<input id="search" placeholder="ابحث عن منتج..." onkeyup="render()">

<!-- أدمن -->
<div id="admin">
<h3>إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">
<button onclick="addProduct()" style="background:green;color:white;">إضافة</button>
</div>

<!-- منتجات -->
<div class="products" id="products"></div>

<!-- سلة -->
<div id="cartBox">
<b>🛒 السلة</b>
<div id="cart"></div>
<p>الإجمالي: <span id="total">0</span> ريال</p>
<button onclick="checkout()" style="background:orange;color:white;">إتمام الطلب</button>
</div>

<!-- واتساب -->
<a class="whatsapp" onclick="checkout()">واتساب 📱</a>

<!-- نافذة المنتج -->
<div id="modal" onclick="closeModal()">
<div id="modalContent" onclick="event.stopPropagation()">
<h3 id="mName"></h3>
<img id="mImg" style="width:100%;border-radius:10px;">
<p id="mPrice"></p>
<button onclick="addModal()" style="background:green;color:white;">إضافة للسلة</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"فستان بناتي", price:180, img:"https://via.placeholder.com/300"},
{name:"حذاء أطفال", price:90, img:"https://via.placeholder.com/300"},
{name:"طقم أطفال", price:150, img:"https://via.placeholder.com/300"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let selected=null;

/* عرض */
function render(){
let s=document.getElementById("search").value.toLowerCase();
let html="";

products.forEach((p,i)=>{
if(p.name.toLowerCase().includes(s)){
html+=`
<div class="card">
<img src="${p.img}" onclick="openModal(${i})">
<h4>${p.name}</h4>
<p>${p.price} ريال</p>
<button class="add" onclick="addCart(${i})">إضافة</button>
<button class="del" onclick="del(${i})">حذف</button>
</div>`;
}
});

document.getElementById("products").innerHTML=html;
}

/* مودال */
function openModal(i){
selected=products[i];
document.getElementById("mName").innerText=selected.name;
document.getElementById("mPrice").innerText=selected.price+" ريال";
document.getElementById("mImg").src=selected.img;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function addModal(){
addCartByObj(selected);
closeModal();
}

/* إضافة للسلة */
function addCart(i){
addCartByObj(products[i]);
}

function addCartByObj(item){
let f=cart.find(c=>c.name===item.name);
if(f) f.qty++;
else cart.push({...item,qty:1});
save();
renderCart();
}

/* حذف منتج */
function del(i){
products.splice(i,1);
save();
render();
}

/* سلة */
function renderCart(){
let html="";
let total=0;

cart.forEach((c,i)=>{
html+=`
${c.name} x${c.qty} = ${c.price*c.qty}
<button onclick="remove(${i})" style="background:red;color:white;">X</button><br>`;
total+=c.price*c.qty;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

function remove(i){
cart.splice(i,1);
save();
renderCart();
}

/* إضافة منتج */
function addProduct(){
products.push({
name:name.value,
price:Number(price.value),
img:img.value
});
save();
render();
}

/* حفظ */
function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* واتساب */
function checkout(){
let phone="966537585439";
let msg="طلب جديد:%0A";

if(cart.length===0){
alert("السلة فاضية");
return;
}

cart.forEach(c=>{
msg+=`${c.name} x${c.qty} = ${c.price*c.qty}%0A`;
});

window.open("https://wa.me/"+phone+"?text="+msg);
}

render();
renderCart();
</script>

</body>
</html>
