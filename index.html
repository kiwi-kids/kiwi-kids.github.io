<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المتجر الكامل</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#000;color:#fff;padding:15px;display:flex;justify-content:space-between}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:10px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.card button{width:100%;padding:10px;background:#ff5722;color:#fff;border:none}
.popup{position:fixed;inset:0;background:#0008;display:none;justify-content:center;align-items:center}
.box{background:#fff;padding:15px;width:90%;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0}
</style>
</head>

<body>

<header>
<div>🛍️ المتجر</div>
<div>🛒 <span id="count">0</span></div>
</header>

<div class="products" id="products"></div>

<!-- السلة -->
<div class="popup" id="cartBox">
<div class="box">
<h3>السلة</h3>
<div id="cartItems"></div>
<button onclick="checkout()">إتمام الطلب</button>
<button onclick="cartBox.style.display='none'">إغلاق</button>
</div>
</div>

<!-- الطلب -->
<div class="popup" id="orderBox">
<div class="box">
<h3>بيانات الطلب</h3>
<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الجوال">
<button onclick="sendOrder()">إرسال الطلب</button>
</div>
</div>

<script>
// 🔥 ضع بيانات Firebase هنا
const firebaseConfig = {
apiKey:"YOUR",
databaseURL:"YOUR",
projectId:"YOUR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cart = [];

// عرض المنتجات
db.ref("products").on("value", snap=>{
products.innerHTML="";
snap.forEach(c=>{
let p=c.val();

products.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price} ريال</p>
<button onclick='addCart(${JSON.stringify(p)})'>أضف للسلة</button>
</div>`;
});
});

// إضافة للسلة
function addCart(p){
cart.push(p);
count.innerText = cart.length;
}

// فتح السلة
function openCart(){
cartItems.innerHTML="";
cart.forEach(p=>{
cartItems.innerHTML+=`<p>${p.name} - ${p.price}</p>`;
});
cartBox.style.display="flex";
}

// الدفع
function checkout(){
cartBox.style.display="none";
orderBox.style.display="flex";
}

// إرسال الطلب
function sendOrder(){
db.ref("orders").push({
name:name.value,
phone:phone.value,
cart:cart,
time:Date.now()
});

alert("تم الطلب بنجاح 🔥");

cart=[];
count.innerText=0;
orderBox.style.display="none";
}
</script>

</body>
</html>
