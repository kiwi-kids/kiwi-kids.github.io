```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر احترافي</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f1f1f1;
}

/* الهيدر */
header {
  background:#111;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart-icon {
  position:relative;
  cursor:pointer;
}

.badge {
  position:absolute;
  top:-5px;
  left:-5px;
  background:red;
  color:#fff;
  font-size:12px;
  padding:3px 6px;
  border-radius:50%;
}

/* إضافة منتج */
.container {
  padding:15px;
}

input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#ff5722;
  color:#fff;
  border:none;
}

/* المنتجات */
.products {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
}

.product {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.product h4, .product p {
  margin:5px;
}

.product button {
  background:#000;
}

/* السلة */
.cart-popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.cart-box {
  background:#fff;
  width:90%;
  max-height:80%;
  overflow:auto;
  border-radius:10px;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <div>🛍️ متجري</div>
  <div class="cart-icon" onclick="openCart()">
    🛒
    <span class="badge" id="cartCount">0</span>
  </div>
</header>

<div class="container">

<h3>إضافة منتج</h3>
<input type="text" id="name" placeholder="اسم المنتج">
<input type="number" id="price" placeholder="السعر">
<input type="file" id="image" accept="image/*">
<button onclick="addProduct()">إضافة</button>

<hr>

<div class="products" id="products"></div>

</div>

<!-- السلة -->
<div class="cart-popup" id="cartPopup">
  <div class="cart-box">
    <h3>سلة المشتريات</h3>
    <div id="cartItems"></div>
    <button onclick="closeCart()">إغلاق</button>
  </div>
</div>

<script>
// 🔥 بياناتك هنا
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-DOMAIN",
  databaseURL: "YOUR-DATABASE-URL",
  projectId: "YOUR-ID",
  storageBucket: "YOUR-BUCKET",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

// سلة
let cart = [];

// رفع صورة
function uploadImage(file) {
  const ref = storage.ref("products/" + Date.now() + file.name);
  return ref.put(file).then(s => s.ref.getDownloadURL());
}

// إضافة منتج
function addProduct() {
  const name = nameInput.value;
  const price = priceInput.value;
  const file = image.files[0];

  if (!file) return alert("اختر صورة");

  uploadImage(file).then(url=>{
    db.ref("products").push({name, price, image:url});
    alert("تمت الإضافة");
  });
}

// عرض المنتجات
db.ref("products").on("value", snap=>{
  products.innerHTML="";
  snap.forEach(c=>{
    const p=c.val();

    products.innerHTML += `
    <div class="product">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>${p.price} ريال</p>
      <button onclick='addToCart(${JSON.stringify(p)})'>أضف للسلة</button>
    </div>`;
  });
});

// إضافة للسلة
function addToCart(p){
  cart.push(p);
  cartCount.innerText = cart.length;
}

// فتح السلة
function openCart(){
  cartPopup.style.display="flex";
  cartItems.innerHTML="";
  cart.forEach(p=>{
    cartItems.innerHTML += `<p>${p.name} - ${p.price} ريال</p>`;
  });
}

// إغلاق
function closeCart(){
  cartPopup.style.display="none";
}
</script>

</body>
</html>
```
