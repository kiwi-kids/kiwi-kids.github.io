<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر</title>
<style>
body { font-family: Arial; direction: rtl; padding: 20px; }
input, button { margin: 5px; padding: 10px; }
.product { border: 1px solid #ccc; padding: 10px; margin: 10px; }
img { width: 120px; height: 120px; object-fit: cover; }
</style>
</head>
<body>

<h2>إضافة منتج</h2>

<input type="text" id="name" placeholder="اسم المنتج"><br>
<input type="number" id="price" placeholder="السعر"><br>

<input type="file" id="fileInput" accept="image/*"><br>

<button onclick="addProduct()">إضافة المنتج</button>

<p id="status"></p>

<hr>

<h2>المنتجات</h2>
<div id="products"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  databaseURL: "XXXX",
  projectId: "XXXX",
  storageBucket: "XXXX",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const productsRef = ref(db, "products");

let selectedFile = null;

// اختيار صورة
document.getElementById("fileInput").addEventListener("change", (e) => {
  selectedFile = e.target.files[0];
});

// إضافة منتج
window.addProduct = async function () {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const status = document.getElementById("status");

  if (!name || !price || !selectedFile) {
    alert("أدخل البيانات كاملة");
    return;
  }

  status.innerText = "جاري رفع الصورة...";

  // رفع الصورة
  const imageRef = sRef(storage, "products/" + Date.now() + selectedFile.name);
  await uploadBytes(imageRef, selectedFile);
  const imageUrl = await getDownloadURL(imageRef);

  status.innerText = "جاري حفظ المنتج...";

  // حفظ المنتج في قاعدة البيانات
  push(productsRef, {
    name: name,
    price: price,
    image: imageUrl
  });

  status.innerText = "تم إضافة المنتج ✅";

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("fileInput").value = "";
  selectedFile = null;
};

// عرض المنتجات
onValue(productsRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("products");
  container.innerHTML = "";

  for (let id in data) {
    const p = data[id];

    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} ريال</p>
      </div>
    `;
  }
});
</script>

</body>
</html>
