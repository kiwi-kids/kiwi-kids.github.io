<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر برو</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f6f7fb;
}

/* هيدر */
header{
  background:linear-gradient(90deg,#ff3d7f,#ff7a59);
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* المنتجات */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card .info{
  padding:8px;
}

button{
  width:100%;
  padding:8px;
  border:none;
  background:#ff3d7f;
  color:white;
  border-radius:8px;
}

/* إضافة منتج */
.admin{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* السلة */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-top:1px solid #ddd;
  padding:10px;
}

.cart-item{
  font-size:14px;
  margin:3px 0;
}

.total{
  font-weight:bold;
}
</style>
</head>

<body>

<header>🛍️ متجر برو احترافي</header>

<div class="admin">
  <h3>إضافة منتج</h3>

  <input type="text" id="name" placeholder="اسم المنتج">
  <input type="number" id="price" placeholder="السعر">
  <input type="file" id="file">

  <button onclick="addProduct()">رفع المنتج</button>
  <p id="status"></p>
</div>

<div class="grid" id="grid"></div>

<!-- السلة -->
<div class="cart">
  <div id="cart"></div>
  <div class="total" id="total">المجموع: 0 ريال</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  databaseURL: "XXXX",
  projectId: "XXXX",
  storageBucket: "XXXX",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const productsRef = ref(db,"products");

let file = null;
let cart = [];

document.getElementById("file").addEventListener("change",(e)=>{
  file = e.target.files[0];
});

/* إضافة منتج */
window.addProduct = async function(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  if(!name || !price || !file){
    alert("أكمل البيانات");
    return;
  }

  document.getElementById("status").innerText = "جاري الرفع...";

  const imgRef = sRef(storage,"p/"+Date.now());
  await uploadBytes(imgRef,file);
  const url = await getDownloadURL(imgRef);

  await push(productsRef,{
    name,
    price,
    image:url
  });

  document.getElementById("status").innerText = "تم إضافة المنتج ✅";
}

/* عرض المنتجات */
onValue(productsRef,(snap)=>{
  const data = snap.val();
  const box = document.getElementById("grid");
  box.innerHTML="";

  for(let id in data){
    let p = data[id];

    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="info">
          <h4>${p.name}</h4>
          <p>${p.price} ريال</p>
          <button onclick='addCart("${p.name}",${p.price})'>أضف للسلة</button>
        </div>
      </div>
    `;
  }
});

/* السلة */
window.addCart = function(name,price){
  cart.push({name,price});
  renderCart();
};

function renderCart(){
  let box = document.getElementById("cart");
  let total = 0;
  box.innerHTML="";

  cart.forEach(i=>{
    total += Number(i.price);
    box.innerHTML += `<div class="cart-item">${i.name} - ${i.price} ريال</div>`;
  });

  document.getElementById("total").innerText = "المجموع: " + total + " ريال";
}

</script>

</body>
</html>
