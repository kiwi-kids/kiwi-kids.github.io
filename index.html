<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
font-size:20px;
}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{font-size:26px}

/* زر القائمة */
.menu-btn{
font-size:45px;
cursor:pointer;
}

/* 🔥 القائمة (أهم إصلاح) */
.sidebar{
position:fixed;
top:0;
right:0;
width:260px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.3);
padding:20px;

/* مخفية بالكامل */
transform:translateX(100%);
transition:0.3s;
z-index:999;
}

.sidebar.open{
transform:translateX(0);
}

/* عناصر القائمة */
.sidebar div{
padding:15px;
border-bottom:1px solid #ddd;
font-size:22px;
}

/* المحتوى */
.content{
padding:20px;
}

/* المنتج */
.product{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="sidebar" id="side">
<div onclick="show('home')">🏠 الرئيسي</div>
<div onclick="show('dresses')">👗 فساتين</div>
<div onclick="show('evening')">🌙 سهرة</div>
</div>

<div class="content" id="content">
<h2>أهلاً 👋</h2>
<p>اضغط ☰</p>
</div>

<script>

function toggleMenu(){
document.getElementById("side").classList.toggle("open");
}

function show(type){
let c=document.getElementById("content");

if(type=="home"){
c.innerHTML="<h2>الرئيسي</h2><p>كل المنتجات هنا</p>";
}

if(type=="dresses"){
c.innerHTML=`
<h2>فساتين</h2>
<div class="product">فستان أطفال - 60</div>
<div class="product">فستان بناتي - 80</div>
`;
}

if(type=="evening"){
c.innerHTML=`
<h2>سهرة</h2>
<div class="product">فستان سهرة - 150</div>
`;
}

document.getElementById("side").classList.remove("open");
}

</script>

</body>
</html>
