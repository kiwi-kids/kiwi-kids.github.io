<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Store</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#ff69b4;color:#fff;padding:15px;text-align:center;}

.add-btn{
background:green;color:white;padding:10px;width:95%;
margin:10px;border:none;border-radius:8px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;
}

.product{
background:white;padding:10px;border-radius:10px;text-align:center;
}

.product img{
width:100%;height:150px;object-fit:cover;border-radius:10px;
}

button{
margin-top:5px;padding:6px;border:none;border-radius:6px;color:white;
cursor:pointer;
}

.cart-btn{background:#ff69b4;}

.cart-icon{
position:fixed;bottom:20px;right:20px;
background:#ff69b4;color:white;padding:15px;border-radius:50%;
}

.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:none;
}

.cart{
position:fixed;top:0;right:-320px;width:300px;height:100%;
background:white;padding:15px;transition:0.3s;overflow:auto;
}

.cart.active{right:0;}
.overlay.active{display:block;}
</style>
</head>

<body>

<header>🛒 Kiwi Kids</header>

<button class="add-btn" onclick="addProduct()">➕ إضافة منتج</button>

<div class="products" id="products"></div>

<div class="cart-icon" onclick="toggleCart()">🛒</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
<h3>السلة</h3>
<div id="cart-items"></div>
<h4 id="total">المجموع: 0 ريال</h4>
<button style="background:#ff69b4;width:100%;" onclick="sendOrder()">طلب واتساب</button>
</div>

<script>

// 🔥 بياناتك جاهزة
const firebaseConfig = {
  apiKey: "AIzaSyB-BudNyGwbDl12jzXGnhkVX_nXWZSBVac",
  authDomain: "kiwi-kids-store-a10c3.firebaseapp.com",
  databaseURL: "https://kiwi-kids-store-a10c3-default-rtdb.firebaseio.com",
  projectId: "kiwi-kids-store-a10c3",
  storageBucket: "kiwi-kids-store-a10c3.firebasestorage.app",
  messagingSenderId: "353021674778",
  appId: "1:353021674778:web:3e2ac25f4d8dd7a94f98a3",
  measurementId: "G-Y7XDQ7FD4Z"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cart = [];

/* تحميل المنتجات */
function loadProducts(){
db.ref("products").on("value", snap=>{
    let data = snap.val() || {};
    let c = document.getElementById("products");
    c.innerHTML = "";

    Object.keys(data).forEach(key=>{
        let p = data[key];

        c.innerHTML += `
        <div class="product">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>${p.price} ريال</p>
            <button class="cart-btn" onclick='addToCart(${JSON.stringify(p)})'>
            أضف للسلة
            </button>
        </div>`;
    });
});
}

/* إضافة منتج */
function addProduct(){
let name = prompt("اسم المنتج:");
let price = prompt("السعر:");

let input = document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=function(){
    let reader = new FileReader();

    reader.onload=function(e){
        db.ref("products").push({
            name:name,
            price:price,
            image:e.target.result
        });
    };

    reader.readAsDataURL(input.files[0]);
};

input.click();
}

/* السلة */
function addToCart(p){
let item = cart.find(i=>i.name===p.name);
if(item) item.qty++;
else cart.push({...p, qty:1});
showCart();
}

function showCart(){
let c = document.getElementById("cart-items");
let total = 0;
c.innerHTML="";

cart.forEach((i,index)=>{
    total += i.price * i.qty;
    c.innerHTML += `
    <div style="margin-bottom:10px;">
        ${i.name} (${i.qty})
    </div>`;
});

document.getElementById("total").innerText="المجموع: "+total+" ريال";
}

/* فتح */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

/* واتساب */
function sendOrder(){
if(cart.length===0) return alert("السلة فاضية");

let msg="طلب:%0A";
cart.forEach(i=>{
msg+=i.name+" × "+i.qty+"%0A";
});

window.open("https://wa.me/966537585439?text="+msg);
}

loadProducts();

</script>

</body>
</html>
