<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiwi Kids</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
font-size:20px;
}

header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{font-size:26px}

.menu-btn{
font-size:40px;
cursor:pointer;
}

.sidebar{
position:fixed;
top:0;
right:-300px;
width:300px;
height:100%;
background:white;
padding:20px;
transition:0.3s;
font-size:22px;
}

.sidebar div{
padding:15px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.content{
padding:20px;
}

.product{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
font-size:20px;
}
</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div class="menu-btn" onclick="toggle()">☰</div>
</header>

<div class="sidebar" id="side">
<div onclick="show('home')">🏠 الرئيسي</div>
<div onclick="show('dresses')">👗 فساتين</div>
<div onclick="show('evening')">🌙 فساتين سهرة</div>
</div>

<div class="content" id="content">
<h2>أهلاً 👋</h2>
<p>اضغط ☰</p>
</div>

<script>

function toggle(){
let s=document.getElementById("side");
s.style.right = (s.style.right=="0px") ? "-300px" : "0px";
}

function show(type){
let c=document.getElementById("content");

if(type=="home"){
c.innerHTML="<h2>🏠 الرئيسي</h2><p>كل المنتجات هنا</p>";
}

if(type=="dresses"){
c.innerHTML=`
<h2>👗 فساتين</h2>
<div class="product">فستان أطفال - 60 ريال</div>
<div class="product">فستان بناتي - 80 ريال</div>
`;
}

if(type=="evening"){
c.innerHTML=`
<h2>🌙 فساتين سهرة</h2>
<div class="product">فستان سهرة - 150 ريال</div>
`;
}

document.getElementById("side").style.right="-300px";
}

</script>

</body>
</html>
