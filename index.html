<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Pro Store</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* شبكة */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:6px;
width:90%;
margin:5px;
border-radius:6px;
cursor:pointer;
}

/* السلة */
.cart{
position:fixed;
left:0;
top:0;
width:280px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
padding:15px;
transform:translateX(-100%);
transition:0.3s;
z-index:999;
overflow:auto;
}

.cart.open{
transform:translateX(0);
}

.item{
border-bottom:1px solid #ddd;
padding:5px;
font-size:14px;
}

.total{
font-weight:bold;
margin-top:10px;
}

.whatsapp{
background:#25D366;
}

/* شاشة الدخول */
.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.login-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:8px;
margin:5px;
}
</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div onclick="toggleCart()">🛒</div>
</header>

<!-- تسجيل دخول -->
<div class="login" id="login">
<div class="login-box">
<h3>تسجيل دخول الأدمن</h3>
<input type="password" id="pass" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
</div>
</div>

<!-- أدمن -->
<div style="padding:10px;display:none" id="adminPanel">
<h3>إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">
<button onclick="addProduct()">إضافة</button>
</div>

<!-- السلة -->
<div class="cart" id="cart">
<h3>السلة</h3>
<div id="items"></div>
<div class="total" id="total">0</div>
<button class="whatsapp" onclick="order()">اطلب واتساب</button>
</div>

<!-- المنتجات -->
<div class="grid" id="grid"></div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[
{ name:"فستان أطفال", price:60, img:"https://via.placeholder.com/300" },
{ name:"فستان بناتي", price:80, img:"https://via.placeholder.com/300" }
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;

/* كلمة السر */
function login(){
let p=document.getElementById("pass").value;

if(p==="1234"){
document.getElementById("login").style.display="none";
document.getElementById("adminPanel").style.display="block";
load();
}else{
alert("كلمة السر غلط ❌");
}
}

/* عرض المنتجات */
function load(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price} ريال</div>
<button onclick="add(${i})">أضف للسلة</button>
</div>
`;
});

render();
}

/* إضافة للسلة */
function add(i){
cart.push(products[i]);
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* عرض السلة */
function render(){
let box=document.getElementById("items");
box.innerHTML="";
total=0;

cart.forEach(c=>{
box.innerHTML+=`<div class="item">${c.name} - ${c.price}</div>`;
total+=c.price;
});

document.getElementById("total").innerText="الإجمالي: "+total;
}

/* السلة */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* إضافة منتج */
function addProduct(){
let n=document.getElementById("name").value;
let p=document.getElementById("price").value;
let i=document.getElementById("img").value;

products.push({name:n,price:Number(p),img:i});
localStorage.setItem("products",JSON.stringify(products));

load();
alert("تمت الإضافة 🛍️");
}

/* واتساب */
function order(){
let msg="طلب جديد:%0A";

cart.forEach(c=>{
msg+=c.name+" - "+c.price+"%0A";
});
msg+="الإجمالي: "+total;

window.open("https://wa.me/966500000000?text="+msg);
}

load();

</script>

</body>
</html>
