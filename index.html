<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    background: #ffb6c1;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: white;
    position: relative;
}

/* زر السلة */
.cart-btn {
    position: absolute;
    left: 10px;
    top: 10px;
    background: white;
    color: #ff69b4;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
}

.products {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin: 20px;
}

.product-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.product {
    min-width: 220px;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.main-img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 8px;
    border-radius: 5px;
    cursor: pointer;
}

/* السلة */
.cart {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: #fff;
    border-left: 2px solid #eee;
    padding: 10px;
    overflow-y: auto;
}

.cart h3 {
    text-align: center;
}

.cart-item {
    border-bottom: 1px solid #eee;
    padding: 5px;
    margin-bottom: 5px;
}

.remove {
    color: red;
    cursor: pointer;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
Kiwi Kids 👗
<div class="cart-btn" onclick="toggleCart()">
🛒 (<span id="cartCount">0</span>)
</div>
</header>

<div class="products">

<div class="product-row">

<div class="product">
<img class="main-img" src="dress1.jpg">
<h3>فستان 1</h3>
<p>150 ريال</p>
<button onclick="addToCart('فستان 1',150)">أضف للسلة</button>
</div>

<div class="product">
<img class="main-img" src="dress2.jpg">
<h3>فستان 2</h3>
<p>130 ريال</p>
<button onclick="addToCart('فستان 2',130)">أضف للسلة</button>
</div>

<div class="product">
<img class="main-img" src="dress3.jpg">
<h3>فستان 3</h3>
<p>170 ريال</p>
<button onclick="addToCart('فستان 3',170)">أضف للسلة</button>
</div>

</div>

</div>

<!-- السلة -->
<div class="cart" id="cart">
<h3>سلة المشتريات 🛒</h3>
<div id="cartItems"></div>
<h4>الإجمالي: <span id="total">0</span> ريال</h4>
<button onclick="checkout()">إتمام الطلب</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
    cart.push({name, price});
    updateCart();
}

function updateCart() {
    document.getElementById("cartCount").innerText = cart.length;

    let items = document.getElementById("cartItems");
    items.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        items.innerHTML += `
        <div class="cart-item">
            ${item.name} - ${item.price} ريال
            <div class="remove" onclick="removeItem(${index})">حذف</div>
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
}

function toggleCart() {
    let c = document.getElementById("cart");
    c.style.display = c.style.display === "block" ? "none" : "block";
}

function checkout() {
    let msg = "طلب جديد:%0A";
    cart.forEach(i => {
        msg += `- ${i.name} ${i.price} ريال%0A`;
    });

    window.open("https://wa.me/966537585439?text=" + msg);
}
</script>

</body>
</html>
