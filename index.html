<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi Kids | ملابس أطفال</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      text-align: center;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      font-size: 24px;
    }
    .container {
      padding: 20px;
    }
    .product {
      background: white;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      max-width: 300px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>Kiwi Kids 👶</header>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/300" alt="منتج">
    <h3>فستان أطفال</h3>
    <p>سعر: 50 ريال</p>
    <button>اطلب الآن</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="منتج">
    <h3>بدلة أطفال</h3>
    <p>سعر: 70 ريال</p>
    <button>اطلب الآن</button>
  </div>
</div>

</body>
</html>
