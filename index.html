<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    background: #ffb6c1;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: white;
}

/* الصفوف */
.products {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin: 20px;
}

/* كل صف */
.product-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* الكرت */
.product {
    min-width: 220px;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    background: #fff;
}

.main-img {
    width: 100%;
    border-radius: 10px;
}

/* صور المنتج */
.gallery {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    margin-top: 8px;
}

.gallery img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
}

.gallery img.active {
    border: 2px solid #ff69b4;
}

button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>Kiwi Kids 👗</header>

<div class="products">

<!-- الصف الأول -->

<div class="product-row">

<div class="product">
<img id="m1" class="main-img" src="dress1.jpg">
<h3>فستان 1</h3>
<p>150 ريال</p>

<div class="gallery">
<img src="dress1.jpg" class="active" onclick="changeImage('m1', this)">
<img src="dress2.jpg" onclick="changeImage('m1', this)">
<img src="dress3.jpg" onclick="changeImage('m1', this)">
</div>

<button onclick="order()">اطلب الآن</button>

</div>

<div class="product">
<img id="m2" class="main-img" src="dress2.jpg">
<h3>فستان 2</h3>
<p>130 ريال</p>

<div class="gallery">
<img src="dress2.jpg" class="active" onclick="changeImage('m2', this)">
<img src="dress3.jpg" onclick="changeImage('m2', this)">
<img src="dress1.jpg" onclick="changeImage('m2', this)">
</div>

<button onclick="order()">اطلب الآن</button>

</div>

</div>

<!-- الصف الثاني -->

<div class="product-row">

<div class="product">
<img id="m3" class="main-img" src="dress3.jpg">
<h3>فستان 3</h3>
<p>170 ريال</p>

<div class="gallery">
<img src="dress3.jpg" class="active" onclick="changeImage('m3', this)">
<img src="dress1.jpg" onclick="changeImage('m3', this)">
<img src="dress2.jpg" onclick="changeImage('m3', this)">
</div>

<button onclick="order()">اطلب الآن</button>

</div>

<div class="product">
<img id="m4" class="main-img" src="dress1.jpg">
<h3>فستان 4</h3>
<p>140 ريال</p>

<div class="gallery">
<img src="dress1.jpg" class="active" onclick="changeImage('m4', this)">
<img src="dress2.jpg" onclick="changeImage('m4', this)">
<img src="dress3.jpg" onclick="changeImage('m4', this)">
</div>

<button onclick="order()">اطلب الآن</button>

</div>

</div>

<!-- الصف الثالث -->

<div class="product-row">

<div class="product">
<img id="m5" class="main-img" src="dress2.jpg">
<h3>فستان 5</h3>
<p>160 ريال</p>

<div class="gallery">
<img src="dress2.jpg" class="active" onclick="changeImage('m5', this)">
<img src="dress1.jpg" onclick="changeImage('m5', this)">
<img src="dress3.jpg" onclick="changeImage('m5', this)">
</div>

<button onclick="order()">اطلب الآن</button>

</div>

<div class="product">
<img id="m6" class="main-img" src="dress3.jpg">
<h3>فستان 6</h3>
<p>180 ريال</p>

<div class="gallery">
<img src="dress3.jpg" class="active" onclick="changeImage('m6', this)">
<img src="dress2.jpg" onclick="changeImage('m6', this)">
<img src="dress1.jpg" onclick="changeImage('m6', this)">
</div>

<button onclick="order()">اطلب الآن</button>

</div>

</div>

</div>

<script>
function order() {
    window.open("https://wa.me/966537585439");
}

function changeImage(id, el) {
    document.getElementById(id).src = el.src;

    let images = el.parentElement.querySelectorAll("img");
    images.forEach(img => img.classList.remove("active"));

    el.classList.add("active");
}
</script>

</body>
</html>
