<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Store Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
text-align:center;
}

header{
background:linear-gradient(135deg,#ff6a88,#ff99ac);
color:white;
padding:15px;
font-weight:bold;
}

#search{
width:85%;
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* منتجات */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:170px;
background:white;
margin:10px;
padding:10px;
border-radius:15px;
box-shadow:0 0 10px #ddd;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:7px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add{background:#ff69b4;color:white}

/* زر السلة */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#111;
color:white;
padding:12px 15px;
border-radius:50px;
cursor:pointer;
z-index:1001;
}

/* الخلفية */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:999;
}

/* السلة الجانبية */
#cartBox{
position:fixed;
top:0;
right:-320px;
width:280px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
z-index:1000;
overflow:auto;
text-align:left;
}

.del{background:red;color:white}
</style>
</head>

<body>

<header>🛍️ Kiwi Kids Store</header>

<input id="search" placeholder="ابحث عن منتج..." onkeyup="render()">

<!-- المنتجات -->
<div class="products" id="products"></div>

<!-- زر السلة -->
<div id="cartBtn" onclick="openCart()">🛒 السلة</div>

<!-- خلفية -->
<div id="overlay" onclick="closeCart()"></div>

<!-- السلة -->
<div id="cartBox">
<h3>🛒 السلة</h3>

<div id="cart"></div>

<p>الإجمالي: <span id="total">0</span> ريال</p>

<button onclick="checkout()" style="background:orange;color:white;">
إتمام الطلب
</button>

<br><br>
<button onclick="closeCart()" style="background:#ccc;">
إغلاق
</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"فستان بناتي", price:180, img:"https://via.placeholder.com/300"},
{name:"حذاء أطفال", price:90, img:"https://via.placeholder.com/300"},
{name:"طقم أطفال", price:150, img:"https://via.placeholder.com/300"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* عرض المنتجات */
function render(){
let s=document.getElementById("search").value.toLowerCase();
let html="";

products.forEach((p,i)=>{
if(p.name.toLowerCase().includes(s)){
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} ريال</p>
<button class="add" onclick="addCart(${i})">إضافة</button>
</div>`;
}
});

document.getElementById("products").innerHTML=html;
}

/* إضافة للسلة */
function addCart(i){
let item=products[i];

let found=cart.find(c=>c.name===item.name);
if(found){
found.qty++;
}else{
cart.push({...item,qty:1});
}

save();
renderCart();
}

/* عرض السلة */
function renderCart(){
let html="";
let total=0;

cart.forEach((c,i)=>{
html+=`
${c.name} x${c.qty}
<button class="del" onclick="removeItem(${i})">X</button><br>`;
total+=c.price*c.qty;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* حذف */
function removeItem(i){
cart.splice(i,1);
save();
renderCart();
}

/* حفظ */
function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* فتح السلة */
function openCart(){
document.getElementById("cartBox").style.right="0";
document.getElementById("overlay").style.display="block";
}

/* إغلاق */
function closeCart(){
document.getElementById("cartBox").style.right="-320px";
document.getElementById("overlay").style.display="none";
}

/* واتساب */
function checkout(){
let phone="966537585439";
let msg="طلب جديد:%0A";

if(cart.length===0){
alert("السلة فاضية");
return;
}

cart.forEach(c=>{
msg+=`${c.name} x${c.qty} = ${c.price*c.qty}%0A`;
});

window.open("https://wa.me/"+phone+"?text="+msg);
}

render();
renderCart();

</script>

</body>
</html>
