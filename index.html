<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff;
    text-align: center;
}

/* الهيدر (الشعار) */
.hero {
    background: #ffe4ec;
    padding: 30px 10px;
}

.hero img {
    width: 220px;
}

/* العنوان */
h2 {
    margin-top: 10px;
}

/* المنتجات */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
}

.product {
    border: 1px solid #eee;
    border-radius: 15px;
    margin: 10px;
    width: 180px;
    padding: 10px;
    box-shadow: 0 0 10px #eee;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

/* زر الطلب */
button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    width: 100%;
    font-size: 14px;
}
</style>

</head>

<body>

<!-- الشعار -->
<div class="hero">
    <img src="logo.png">
</div>

<h2>اهلا بكم في متجر كيوي 👗</h2>

<!-- المنتجات -->
<div class="products">

<div class="product">
<img src="dress1.jpg">
<h3>فستان بناتي</h3>
<p>180 ريال</p>
<button onclick="order()">اطلب الآن</button>
</div>

<div class="product">
<img src="dress2.jpg">
<h3>فستان فراشة</h3>
<p>120 ريال</p>
<button onclick="order()">اطلب الآن</button>
</div>

</div>

<script>
function order() {
    window.open("https://wa.me/966537585439");
}
</script>

</body>
</html>
