<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر نظيف</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#000;color:#fff;padding:15px;text-align:center}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:10px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.card button{width:100%;padding:10px;background:#ff5722;color:#fff;border:none}
</style>
</head>

<body>

<header>🛍️ المتجر</header>

<div class="products" id="products"></div>

<script>

// 🔥 حط بيانات Firebase هنا
const firebaseConfig = {
apiKey: "YOUR",
databaseURL: "YOUR",
projectId: "YOUR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// عرض المنتجات
db.ref("products").on("value", (snap) => {

products.innerHTML = "";

if (!snap.exists()) {
products.innerHTML = "<p style='text-align:center'>لا توجد منتجات</p>";
return;
}

snap.forEach((c) => {
let p = c.val();

products.innerHTML += `
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price} ريال</p>
<button>شراء</button>
</div>
`;
});

});

</script>

</body>
</html>
