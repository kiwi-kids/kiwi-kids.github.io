<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    background: #ffb6c1;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: white;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin: 20px;
}

.product {
    border: 1px solid #eee;
    border-radius: 10px;
    margin: 10px;
    width: 220px;
    text-align: center;
    padding: 10px;
}

.main-img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

.gallery {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-top: 8px;
}

.gallery img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
}

.gallery img.active {
    border: 2px solid #ff69b4;
}

button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* نافذة التكبير */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal img {
    display: block;
    margin: auto;
    max-width: 90%;
    border-radius: 10px;
}

</style>
</head>

<body>

<header>Kiwi Kids 👗</header>

<div class="products">

<div class="product">
<img id="main1" class="main-img" src="dress1.jpg" onclick="zoomImage(this.src)">
<h3>فستان بناتي</h3>
<p>180 ريال</p>

<div class="gallery">
<img src="dress1.jpg" class="active" onclick="changeImage('main1', this)">
<img src="dress2.jpg" onclick="changeImage('main1', this)">
</div>

<button onclick="order()">اطلب الآن</button>
</div>

<div class="product">
<img id="main2" class="main-img" src="dress2.jpg" onclick="zoomImage(this.src)">
<h3>فستان بناتي فراشة</h3>
<p>120 ريال</p>

<div class="gallery">
<img src="dress2.jpg" class="active" onclick="changeImage('main2', this)">
<img src="dress1.jpg" onclick="changeImage('main2', this)">
</div>

<button onclick="order()">اطلب الآن</button>
</div>

</div>

<!-- نافذة التكبير -->
<div id="modal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
function order() {
    window.open("https://wa.me/966537585439");
}

function changeImage(id, el) {
    document.getElementById(id).src = el.src;

    // إزالة التحديد من باقي الصور
    let images = el.parentElement.querySelectorAll("img");
    images.forEach(img => img.classList.remove("active"));

    // إضافة التحديد للصورة المختارة
    el.classList.add("active");
}

function zoomImage(src) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalImg").src = src;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
