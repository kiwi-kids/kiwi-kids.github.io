<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Pro</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{font-size:22px}

/* الشبكة */
.grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:10px;
padding:10px;
}

/* كرت */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.card p{
margin:5px;
font-size:13px;
}

.price{
color:green;
font-weight:bold;
margin-bottom:5px;
}

/* زر */
button{
background:#4CAF50;
color:white;
border:none;
padding:6px;
width:90%;
margin-bottom:8px;
border-radius:6px;
cursor:pointer;
}

/* السلة */
.cart{
position:fixed;
left:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
padding:15px;
transform:translateX(-100%);
transition:0.3s;
z-index:999;
}

.cart.open{
transform:translateX(0);
}

.item{
border-bottom:1px solid #ddd;
padding:5px;
font-size:14px;
}

.total{
font-weight:bold;
margin-top:10px;
}

.whatsapp{
background:#25D366;
margin-top:10px;
}

/* صفحة المنتج */
.detail{
display:none;
padding:20px;
}

.detail img{
width:100%;
border-radius:10px;
}

.back{
background:#333;
margin-top:10px;
}

@media(max-width:600px){
.grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div onclick="toggleCart()">🛒</div>
</header>

<!-- السلة -->
<div class="cart" id="cart">
<h3>السلة</h3>
<div id="items"></div>
<div class="total" id="total">الإجمالي: 0</div>
<button class="whatsapp" onclick="order()">اطلب واتساب</button>
</div>

<!-- المنتجات -->
<div class="grid" id="grid"></div>

<!-- صفحة التفاصيل -->
<div class="detail" id="detail">
<img id="dimg">
<h2 id="dname"></h2>
<p id="dprice"></p>

<button onclick="addDetail()">أضف للسلة</button>
<button class="back" onclick="back()">رجوع</button>
</div>

<script>

/* المنتجات */
const products=[
{ name:"فستان أطفال", price:60, img:"https://via.placeholder.com/300" },
{ name:"فستان بناتي", price:80, img:"https://via.placeholder.com/300" },
{ name:"فستان سهرة", price:150, img:"https://via.placeholder.com/300" },
{ name:"طقم أطفال", price:90, img:"https://via.placeholder.com/300" },
{ name:"عباية بناتي", price:70, img:"https://via.placeholder.com/300" },
{ name:"فستان مناسبات", price:120, img:"https://via.placeholder.com/300" }
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;
let current=null;

/* عرض المنتجات */
function load(){
let g=document.getElementById("grid");

products.forEach((p,i)=>{
g.innerHTML+=`
<div class="card" onclick="openProduct(${i})">
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price} ريال</div>
</div>
`;
});
calc();
}

/* فتح منتج */
function openProduct(i){
current=products[i];
document.getElementById("grid").style.display="none";
document.getElementById("detail").style.display="block";

document.getElementById("dimg").src=current.img;
document.getElementById("dname").innerText=current.name;
document.getElementById("dprice").innerText=current.price+" ريال";
}

/* رجوع */
function back(){
document.getElementById("grid").style.display="grid";
document.getElementById("detail").style.display="none";
}

/* إضافة للسلة */
function add(name,price){
cart.push({name,price});
save();
}

/* من صفحة التفاصيل */
function addDetail(){
cart.push(current);
save();
}

/* حفظ */
function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* عرض السلة */
function render(){
let box=document.getElementById("items");
box.innerHTML="";
total=0;

cart.forEach(c=>{
box.innerHTML+=`<div class="item">${c.name} - ${c.price}</div>`;
total+=c.price;
});

document.getElementById("total").innerText="الإجمالي: "+total;
}

/* حساب أولي */
function calc(){
render();
}

/* السلة */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* واتساب */
function order(){
let msg="طلب جديد:%0A";
cart.forEach(c=>{
msg+=c.name+" - "+c.price+"%0A";
});
msg+="الإجمالي: "+total;

window.open("https://wa.me/966500000000?text="+msg);
}

load();
</script>

</body>
</html>
