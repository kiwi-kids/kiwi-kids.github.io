<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiwi Kids</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
font-size:22px; /* 🔥 تكبير كل الكتابة */
}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* اسم المتجر */
h1{
font-size:28px;
}

/* زر ☰ */
.menu-btn{
font-size:50px; /* 🔥 كبير وواضح */
cursor:pointer;
padding:5px 15px;
}

/* القائمة الجانبية (مهم جدًا التعديل هنا) */
.sidebar{
position:fixed;
top:0;
right:0;              /* 🔥 تبدأ داخل الشاشة */
width:280px;
height:100%;
background:white;
box-shadow:-3px 0 15px rgba(0,0,0,0.3);
padding:25px;
transform:translateX(100%); /* مخفية خارج الشاشة */
transition:0.3s;
z-index:999;
font-size:24px; /* 🔥 تكبير النص داخل القائمة */
}

/* فتح القائمة */
.sidebar.open{
transform:translateX(0);
}

/* عناصر القائمة */
.sidebar div{
padding:18px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

/* المحتوى */
.content{
padding:25px;
font-size:22px;
}

/* المنتجات */
.product{
background:white;
padding:15px;
margin:10px;
border-radius:12px;
font-size:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- القائمة -->
<div class="sidebar" id="side">
<div onclick="show('home')">🏠 الرئيسي</div>
<div onclick="show('dresses')">👗 فساتين</div>
<div onclick="show('evening')">🌙 فساتين سهرة</div>
</div>

<!-- المحتوى -->
<div class="content" id="content">
<h2>أهلاً 👋</h2>
<p>اضغط ☰ واختر قسم</p>
</div>

<script>

/* فتح وإغلاق القائمة (مهم) */
function toggleMenu(){
document.getElementById("side").classList.toggle("open");
}

/* الأقسام */
function show(type){
let c=document.getElementById("content");

if(type==="home"){
c.innerHTML="<h2>🏠 الرئيسي</h2><p>كل المنتجات هنا</p>";
}

if(type==="dresses"){
c.innerHTML=`
<h2>👗 فساتين</h2>
<div class="product">فستان أطفال - 60 ريال</div>
<div class="product">فستان بناتي - 80 ريال</div>
`;
}

if(type==="evening"){
c.innerHTML=`
<h2>🌙 فساتين سهرة</h2>
<div class="product">فستان سهرة فاخر - 150 ريال</div>
`;
}

/* إغلاق القائمة */
document.getElementById("side").classList.remove("open");
}

</script>

</body>
</html>
