<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

/* الهيدر */
header {
    background: #ffb6c1;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    color: white;
}

/* البحث */
#search {
    width: 90%;
    margin-top: 10px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* المنتجات */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 15px;
}

.product {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    position: relative;
    background: #fff;
    cursor: pointer;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.heart {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 18px;
    cursor: pointer;
}

/* السلة */
.cart-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    color: #ff69b4;
}

.cart {
    display: none;
    position: fixed;
    right: 0;
    top: 0;
    width: 300px;
    height: 100%;
    background: #fff;
    border-left: 2px solid #eee;
    padding: 10px;
    overflow-y: auto;
}

/* صفحة المنتج */
#productPage {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    padding: 15px;
    overflow-y: auto;
}

#bigImg {
    width: 100%;
    border-radius: 10px;
}

.thumb {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    cursor: pointer;
    margin: 3px;
}
button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 5px;
    margin-top: 8px;
}
</style>
</head>

<body>

<header>
Kiwi Kids 👗
<input id="search" oninput="filterProducts()" placeholder="ابحث عن منتج...">
</header>

<div class="cart-btn" onclick="toggleCart()">
🛒 (<span id="count">0</span>)
</div>

<!-- المنتجات -->
<div class="products">

<div class="product" data-name="فستان 1" onclick="openProduct('فستان 1',150,['dress1.jpg','dress2.jpg','dress3.jpg'])">
<div class="heart" onclick="event.stopPropagation(); toggleFav(this)">🤍</div>
<img src="dress1.jpg">
<h3>فستان 1</h3>
<p>150 ريال</p>
</div>

<div class="product" data-name="فستان 2" onclick="openProduct('فستان 2',130,['dress2.jpg','dress1.jpg'])">
<div class="heart" onclick="event.stopPropagation(); toggleFav(this)">🤍</div>
<img src="dress2.jpg">
<h3>فستان 2</h3>
<p>130 ريال</p>
</div>

<div class="product" data-name="فستان 3" onclick="openProduct('فستان 3',170,['dress3.jpg','dress1.jpg'])">
<div class="heart" onclick="event.stopPropagation(); toggleFav(this)">🤍</div>
<img src="dress3.jpg">
<h3>فستان 3</h3>
<p>170 ريال</p>
</div>

</div>

<!-- صفحة المنتج -->
<div id="productPage">
<button onclick="closePage()">رجوع</button>

<img id="bigImg">

<div id="thumbs" style="display:flex; gap:5px; margin-top:10px;"></div>

<h2 id="pName"></h2>
<p id="pPrice"></p>

<button onclick="addDetailToCart()">إضافة للسلة</button>
</div>

<!-- السلة -->
<div class="cart" id="cart"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let favs = [];
let selectedProduct = null;

/* حفظ */
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

/* إضافة للسلة */
function addToCart(name, price){
    let found = cart.find(i => i.name === name);

    if(found){
        found.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    updateCart();
}

/* تحديث السلة */
function updateCart(){
    document.getElementById("count").innerText = cart.length;
    saveCart();
    renderCart();
}

/* عرض السلة */
function renderCart(){
    let box = document.getElementById("cart");
    box.innerHTML = "<h3>السلة 🛒</h3>";

    let total = 0;

    cart.forEach((item, i) => {
        total += item.price * item.qty;

        box.innerHTML += `
        <div>
        <b>${item.name}</b><br>
        ${item.price} ريال

        <div>
        <button onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="removeItem(${i})">حذف</button>
        </div>
        </div><hr>`;
    });

    box.innerHTML += `<h4>الإجمالي: ${total}</h4>
    <button onclick="checkout()">واتساب</button>`;
}

/* كمية */
function changeQty(i,v){
    cart[i].qty += v;
    if(cart[i].qty <= 0) cart.splice(i,1);
    updateCart();
}

function removeItem(i){
    cart.splice(i,1);
    updateCart();
}

/* فتح السلة */
function toggleCart(){
    let c = document.getElementById("cart");
    c.style.display = c.style.display === "block" ? "none" : "block";
    renderCart();
}

/* واتساب */
function checkout(){
    let msg = "طلب جديد:%0A";

    cart.forEach(i=>{
        msg += `${i.name} x${i.qty}%0A`;
    });

    window.open("https://wa.me/966537585439?text="+msg);
}

/* المفضلة */
function toggleFav(el){
    let name = el.parentElement.getAttribute("data-name");

    if(favs.includes(name)){
        favs = favs.filter(i=>i!==name);
        el.innerHTML = "🤍";
    } else {
        favs.push(name);
        el.innerHTML = "❤️";
    }
}

/* البحث */
function filterProducts(){
    let val = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".product").forEach(p=>{
        let name = p.getAttribute("data-name").toLowerCase();
        p.style.display = name.includes(val) ? "block":"none";
    });
}

/* صفحة المنتج */
function openProduct(name,price,images){

    selectedProduct = {name,price};

    document.getElementById("productPage").style.display = "block";
    document.getElementById("pName").innerText = name;
    document.getElementById("pPrice").innerText = price + " ريال";

    document.getElementById("bigImg").src = images[0];

    let thumbs = document.getElementById("thumbs");
    thumbs.innerHTML = "";

    images.forEach(img=>{
        thumbs.innerHTML += `<img class="thumb" src="${img}" onclick="bigImg.src='${img}'">`;
    });
}

/* إغلاق */
function closePage(){
    document.getElementById("productPage").style.display = "none";
}

/* إضافة من الصفحة */
function addDetailToCart(){
    addToCart(selectedProduct.name, selectedProduct.price);
}

/* تشغيل */
updateCart();

</script>

</body>
</html>
