db.ref("products").on("value", (snap) => {
  console.log("DATA:", snap.val());

  products.innerHTML = "";

  if (!snap.exists()) {
    products.innerHTML = "<p style='text-align:center'>لا توجد منتجات</p>";
    return;
  }

  snap.forEach((c) => {
    let p = c.val();

    products.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <p>${p.price} ريال</p>
        <button>أضف للسلة</button>
      </div>
    `;
  });
});
