<!DOCTYPE html>
<html>
<head>
<title>Kiwi Kids</title>
<style>
body {font-family:Arial; text-align:center; margin:0;}
header {background:#4CAF50; color:white; padding:15px;}
.login-box {margin-top:50px;}
input {padding:10px; margin:5px;}
button {padding:10px 20px; background:green; color:white; border:none; cursor:pointer;}
#store {display:none; padding:20px;}
.product {border:1px solid #ccc; padding:10px; margin:10px; display:inline-block;}
</style>
</head>

<body>

<header>
<h1>Kiwi Kids</h1>
</header>

<!-- تسجيل الدخول -->
<div class="login-box" id="loginBox">
<h2>دخول الأدمن</h2>
<input type="text" id="user" placeholder="اسم المستخدم"><br>
<input type="password" id="pass" placeholder="كلمة المرور"><br>
<button onclick="login()">دخول</button>
</div>

<!-- المتجر -->
<div id="store">
<h2>المتجر</h2>
<button onclick="addProduct()">➕ إضافة منتج</button>
<div id="products"></div>
</div>

<script>
function login(){
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("store").style.display="block";
  } else {
    alert("بيانات غلط ❌");
  }
}

function addProduct(){
  var name = prompt("اسم المنتج:");
  var price = prompt("السعر:");

  if(name && price){
    var div = document.createElement("div");
    div.className = "product";
    div.innerHTML = "<h3>"+name+"</h3><p>"+price+" ريال</p>";
    document.getElementById("products").appendChild(div);
  }
}
</script>

</body>
</html>
