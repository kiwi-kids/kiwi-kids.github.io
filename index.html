<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiwi Kids</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{font-size:24px}

/* زر القائمة */
.menu-btn{
font-size:40px;
cursor:pointer;
}

/* القائمة */
.sidebar{
position:fixed;
top:0;
right:-300px;
width:260px;
height:100%;
background:white;
padding:20px;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
transition:0.3s;
z-index:999;
}

.sidebar.open{
right:0;
}

.sidebar div{
padding:15px;
border-bottom:1px solid #ddd;
font-size:20px;
cursor:pointer;
}

/* المحتوى */
.content{
padding:20px;
font-size:18px;
}

/* المنتج */
.product{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- القائمة -->
<div class="sidebar" id="side">
<div onclick="show('home')">🏠 الرئيسي</div>
<div onclick="show('dresses')">👗 فساتين</div>
<div onclick="show('evening')">🌙 فساتين سهرة</div>
</div>

<!-- المحتوى -->
<div class="content" id="content">
<h2>أهلاً 👋</h2>
<p>اضغط ☰ واختر قسم</p>
</div>

<script>

/* فتح القائمة */
function toggleMenu(){
document.getElementById("side").classList.toggle("open");
}

/* الأقسام */
function show(type){
let c=document.getElementById("content");

if(type==="home"){
c.innerHTML="<h2>🏠 الرئيسي</h2><p>كل المنتجات هنا</p>";
}

if(type==="dresses"){
c.innerHTML=`
<h2>👗 فساتين</h2>
<div class="product">فستان أطفال - 60 ريال</div>
<div class="product">فستان بناتي - 80 ريال</div>
`;
}

if(type==="evening"){
c.innerHTML=`
<h2>🌙 فساتين سهرة</h2>
<div class="product">فستان سهرة فاخر - 150 ريال</div>
`;
}

/* إغلاق القائمة */
document.getElementById("side").classList.remove("open");
}

</script>

</body>
</html>
