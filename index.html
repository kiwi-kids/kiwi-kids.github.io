<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOON Pro Store Final</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10;
}

.search{
padding:7px;
width:45%;
border-radius:8px;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#111;
color:white;
border:none;
padding:8px;
width:90%;
margin:5px;
border-radius:6px;
cursor:pointer;
}

.catbar{
display:flex;
overflow:auto;
gap:8px;
padding:10px;
background:white;
}

.cat{
background:#eee;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.cart{
position:fixed;
left:0;
top:0;
width:340px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
transform:translateX(-100%);
transition:0.3s;
padding:10px;
overflow:auto;
}

.cart.open{transform:translateX(0)}

.item{
border-bottom:1px solid #ddd;
padding:8px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
}

.qty button{
width:28px;
height:28px;
}

.total{
font-weight:bold;
margin-top:10px;
}

.admin{
display:none;
padding:10px;
background:white;
margin:10px;
border-radius:10px;
}

.login{
position:fixed;
width:100%;
height:100%;
background:#000000cc;
display:flex;
justify-content:center;
align-items:center;
z-index:99;
}

.login-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:8px;
margin:5px;
}

.badge{
background:red;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}
</style>
</head>

<body>

<header>
<h3>NOON Pro Store 🛍️</h3>
<input class="search" id="search" oninput="render()" placeholder="ابحث عن منتج...">
<div onclick="toggleCart()">🛒 <span class="badge" id="count">0</span></div>
</header>

<div class="catbar">
<div class="cat" onclick="setCat('all')">الكل</div>
<div class="cat" onclick="setCat('kids')">أطفال</div>
<div class="cat" onclick="setCat('women')">نساء</div>
<div class="cat" onclick="setCat('men')">رجال</div>
</div>

<div class="login" id="login">
<div class="login-box">
<h3>دخول الأدمن</h3>
<input type="password" id="pass" placeholder="كلمة السر">
<button onclick="login()"
