<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOON PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f6f6f6;
}

/* الهيدر */
header{
background:#ffcc00;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
position:sticky;
top:0;
}

/* بحث */
.search{
padding:10px;
background:white;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* منتجات */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

/* زر */
button{
background:#ffcc00;
border:none;
padding:8px;
width:90%;
margin:5px;
border-radius:8px;
cursor:pointer;
}

/* سلة */
.cart{
position:fixed;
left:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
transform:translateX(-100%);
transition:0.3s;
z-index:999;
overflow:auto;
padding:10px;
}

.cart.open{
transform:translateX(0);
}

/* تسجيل */
.login{
position:fixed;
width:100%;
height:100%;
background:#000000cc;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:8px;
margin:5px;
}
</style>
</head>

<body>

<header>
<div>🛍️ NOON PRO MAX</div>
<div onclick="toggleCart()">🛒</div>
</header>

<!-- بحث -->
<div class="search">
<input onkeyup="search(this.value)" placeholder="ابحث عن منتج...">
</div>

<!-- تسجيل -->
<div class="login" id="login">
<div class="box">
<h3>دخول الأدمن</h3>
<input type="password" id="pass">
<button onclick="login()">دخول</button>
</div>
</div>

<!-- أدمن -->
<div id="admin" style="display:none;padding:10px;">
<h3>إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">
<button onclick="addProduct()">إضافة</button>
</div>

<!-- السلة -->
<div class="cart" id="cart">
<h3>السلة 🛒</h3>
<div id="items"></div>
<h3 id="total">0</h3>
<button onclick="order()">اطلب واتساب</button>
</div>

<!-- منتجات -->
<div class="grid" id="grid"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"فستان أطفال",price:60,img:"https://via.placeholder.com/300"},
{name:"حذاء رياضي",price:120,img:"https://via.placeholder.com/300"},
{name:"ساعة يد",price:90,img:"https://via.placeholder.com/300"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let showProducts = [...products];

/* دخول */
function login(){
let p=document.getElementById("pass").value;
if(p==="1234"){
document.getElementById("login").style.display="none";
document.getElementById("admin").style.display="block";
load();
}else alert("كلمة سر خطأ");
}

/* عرض */
function load(){
let g=document.getElementById("grid");
g.innerHTML="";

showProducts.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price} ريال</div>
<button onclick="add(${i})">أضف للسلة</button>
</div>
`;
});

renderCart();
}

/* بحث */
function search(v){
showProducts = products.filter(p=>p.name.includes(v));
load();
}

/* إضافة للسلة */
function add(i){
cart.push(showProducts[i]);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

/* عرض السلة */
function renderCart(){
let box=document.getElementById("items");
box.innerHTML="";
let total=0;

cart.forEach(c=>{
box.innerHTML+=`<div>${c.name} - ${c.price}</div>`;
total+=c.price;
});

document.getElementById("total").innerText="الإجمالي: "+total;
}

/* سلة */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* إضافة منتج */
function addProduct(){
let n=document.getElementById("name").value;
let p=document.getElementById("price").value;
let i=document.getElementById("img").value;

products.push({name:n,price:Number(p),img:i});
localStorage.setItem("products",JSON.stringify(products));

showProducts=[...products];
load();
}

/* طلب */
function order(){
let msg="طلب جديد:%0A";
let total=0;

cart.forEach(c=>{
msg+=c.name+" - "+c.price+"%0A";
total+=c.price;
});

msg+="%0Aالإجمالي: "+total;

window.open("https://wa.me/966500000000?text="+msg);
}

load();

</script>

</body>
</html>
