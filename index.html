<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Ultra</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
text-align:center;
}

/* هيدر */
header{
background:linear-gradient(135deg,#ff6a88,#ff99ac);
color:white;
padding:15px;
}

/* تسجيل دخول */
#login{
width:250px;
margin:20px auto;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px #ddd;
}

input{
width:90%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ddd;
}

/* أدمن */
#admin{
display:none;
background:white;
margin:10px;
padding:10px;
border-radius:12px;
box-shadow:0 0 10px #ddd;
}

/* منتجات */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:180px;
background:white;
margin:10px;
padding:10px;
border-radius:15px;
box-shadow:0 0 10px #ddd;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add{background:#ff69b4;color:white}
.del{background:red;color:white}

/* سلة */
#cartBox{
position:fixed;
bottom:10px;
left:10px;
width:250px;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 0 10px #ccc;
font-size:13px;
}

/* واتساب */
.whatsapp{
position:fixed;
bottom:10px;
right:10px;
background:#25D366;
color:white;
padding:12px;
border-radius:50px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h2>Kiwi Kids Ultra 🥝</h2>
</header>

<!-- تسجيل دخول -->
<div id="login">
<h3>دخول الأدمن</h3>
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()" style="background:green;color:white;">دخول</button>
</div>

<!-- لوحة الأدمن -->
<div id="admin">
<h3>إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">
<button onclick="addProduct()" style="background:green;color:white;">إضافة</button>
</div>

<!-- منتجات -->
<div class="products" id="products"></div>

<!-- سلة -->
<div id="cartBox">
<b>🛒 السلة</b>
<div id="cart"></div>
<p>الإجمالي: <span id="total">0</span></p>
<button onclick="checkout()" style="background:orange;color:white;">إتمام الطلب</button>
</div>

<!-- واتساب -->
<a class="whatsapp" onclick="checkout()">واتساب</a>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"فستان بناتي", price:180, img:"https://via.placeholder.com/300"},
{name:"حذاء أطفال", price:90, img:"https://via.placeholder.com/300"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* تسجيل دخول */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("login").style.display="none";
document.getElementById("admin").style.display="block";
}else{
alert("خطأ");
}
}

/* عرض */
function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} ريال</p>
<button class="add" onclick="addCart(${i})">إضافة</button>
<button class="del" onclick="del(${i})">حذف</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* إضافة منتج */
function addProduct(){
products.push({
name:document.getElementById("name").value,
price:Number(document.getElementById("price").value),
img:document.getElementById("img").value
});
save();
render();
}

/* حذف */
function del(i){
products.splice(i,1);
save();
render();
}

/* سلة */
function addCart(i){
let item=products[i];

let found=cart.find(c=>c.name===item.name);
if(found){
found.qty++;
}else{
cart.push({...item,qty:1});
}

save();
renderCart();
}

/* عرض السلة */
function renderCart(){
let html="";
let total=0;

cart.forEach(c=>{
html+=`${c.name} x${c.qty}<br>`;
total+=c.price*c.qty;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* حفظ */
function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* واتساب */
function checkout(){
let phone="966537585439";
let msg="طلب جديد:%0A";

cart.forEach(c=>{
msg+=`${c.name} x${c.qty}%0A`;
});

window.open("https://wa.me/"+phone+"?text="+msg);
}

render();
renderCart();

</script>

</body>
</html>
