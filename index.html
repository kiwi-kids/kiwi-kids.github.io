<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOON PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f4f4f4;
}

header{
background:#ffcc00;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
position:sticky;
top:0;
z-index:10;
}

.cart-btn{position:relative;cursor:pointer;}
.badge{position:absolute;top:-8px;left:-8px;background:red;color:white;font-size:12px;padding:2px 6px;border-radius:50%;}

.search{padding:10px;background:white;}
.search input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{width:100%;height:130px;object-fit:cover;}

.price{color:green;font-weight:bold;}

button{
background:#ffcc00;
border:none;
padding:8px;
width:90%;
margin:5px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* سلة */
.cart{
position:fixed;
left:0;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
transform:translateX(-100%);
transition:0.3s;
z-index:999;
overflow:auto;
padding:10px;
}

.cart.open{transform:translateX(0);}

/* خلفية */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:998;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #eee;
font-size:14px;
gap:5px;
}

.small-btn{
background:#ff4444;
color:white;
border:none;
padding:3px 6px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}
.view-btn{
background:#2196F3;
color:white;
border:none;
padding:3px 6px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

</style>
</head>

<body>

<header>
<div>🛍️ NOON PRO MAX</div>
<div class="cart-btn" onclick="toggleCart()">
🛒 <span class="badge" id="count">0</span>
</div>
</header>

<div class="search">
<input onkeyup="search(this.value)" placeholder="ابحث عن منتج...">
</div>

<div class="cart" id="cart">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>السلة 🛒</h3>
<button onclick="toggleCart()" style="width:40px;height:40px;border-radius:50%;">✖</button>
</div>

<div id="items"></div>

<h3 id="total">الإجمالي: 0</h3>
<button onclick="order()">اطلب واتساب</button>
</div>

<div id="overlay" onclick="toggleCart()"></div>

<div class="grid" id="grid"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"فستان أطفال",price:60,img:"https://via.placeholder.com/300"},
{name:"حذاء رياضي",price:120,img:"https://via.placeholder.com/300"},
{name:"ساعة يد",price:90,img:"https://via.placeholder.com/300"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let showProducts = [...products];

function load(){
let g=document.getElementById("grid");
g.innerHTML="";

showProducts.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price} ريال</div>
<button onclick="add(${i})">أضف للسلة</button>
</div>
`;
});

renderCart();
updateCount();
}

function search(v){
showProducts = products.filter(p=>p.name.includes(v));
load();
}

function add(i){
cart.push(showProducts[i]);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
updateCount();
}

function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
updateCount();
}

function renderCart(){
let box=document.getElementById("items");
box.innerHTML="";
let total=0;

cart.forEach((c,i)=>{
box.innerHTML+=`
<div class="cart-item">
<div>
<div>${c.name}</div>
<div>${c.price} ر.س</div>
</div>

<button class="view-btn" onclick="viewProduct(${i})">عرض</button>
<button class="small-btn" onclick="removeItem(${i})">حذف</button>
</div>
`;
total+=c.price;
});

document.getElementById("total").innerText="الإجمالي: "+total+" ر.س";
}

function updateCount(){
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
let cartBox=document.getElementById("cart");
let overlay=document.getElementById("overlay");

cartBox.classList.toggle("open");

overlay.style.display = cartBox.classList.contains("open") ? "block" : "none";
}

function viewProduct(i){
let p = cart[i];
alert("📦 المنتج:\n\n" + p.name + "\n" + p.price + " ريال");
}

function order(){
let msg="طلب جديد:%0A";
let total=0;

cart.forEach(c=>{
msg+=c.name+" - "+c.price+"%0A";
total+=c.price;
});

msg+="%0Aالإجمالي: "+total;

window.open("https://wa.me/966500000000?text="+msg);
}

load();

</script>

</body>
</html>
