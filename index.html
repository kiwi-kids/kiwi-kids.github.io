<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff;
    text-align:center;
}

/* الهيدر */
.hero{
    background:#ffe4ec;
    padding:20px;
}

.hero img{
    width:180px;
}

/* البحث 
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.add{background:#ff69b4}
.buy{background:#4facfe}

/* السلة */
#cartBox{
    position:fixed;
    bottom:10px;
    left:10px;
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    width:200px;
    box-shadow:0 0 10px #ccc;
    font-size:13px;
}

/* واتساب */
.whatsapp{
    position:fixed;
    bottom:10px;
    right:10px;
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:50px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
    <img src="logo.png">
</div>

<h2>متجر كيوي 👗</h2>

<input type="text" id="search" onkeyup="filter()" placeholder="ابحث عن منتج...">

<div class="products" 
    let input = document.getElementById("search").value.toLowerCase();
    let items = document.getElementsByClassName("product");

    for(let i=0;i<items.length;i++){
        let name = items[i].getAttribute("data-name");
        items[i].style.display = name.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
