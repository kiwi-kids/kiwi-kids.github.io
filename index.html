<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    background: #ffb6c1;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: white;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin: 20px;
}

.product {
    border: 1px solid #eee;
    border-radius: 10px;
    margin: 10px;
    width: 220px;
    text-align: center;
    padding: 10px;
}

.main-img {
    width: 100%;
    border-radius: 10px;
}

.gallery {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-top: 8px;
}

.gallery img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #ddd;
}

button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>Kiwi Kids 👗</header>

<div class="products">

<div class="product">
<img id="main1" class="main-img" src="dress1.jpg">
<h3>فستان بناتي</h3>
<p>180 ريال</p>

<div class="gallery">
<img src="dress1.jpg" onclick="changeImage('main1', this.src)">
<img src="dress2.jpg" onclick="changeImage('main1', this.src)">
</div>

<button onclick="order()">اطلب الآن</button>
</div>

<div class="product">
<img id="main2" class="main-img" src="dress2.jpg">
<h3>فستان بناتي فراشة</h3>
<p>120 ريال</p>

<div class="gallery">
<img src="dress2.jpg" onclick="changeImage('main2', this.src)">
<img src="dress1.jpg" onclick="changeImage('main2', this.src)">
</div>

<button onclick="order()">اطلب الآن</button>
</div>

</div>

<script>
function order() {
    window.open("https://wa.me/966537585439");
}

function changeImage(id, src) {
    document.getElementById(id).src = src;
}
</script>

</body>
</html>
