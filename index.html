<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>متجر Kiwi Kids</title>
</head>

<body style="font-family:Arial; text-align:center;">

<h1>🛍️ منتجات المتجر</h1>

<div id="products"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<script>
var firebaseConfig = {
  databaseURL: "https://kiwi-kids-34de7-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database().ref("products");

db.on("value", function(snapshot) {
  var data = snapshot.val();
  var output = "";

  if (!data) {
    document.getElementById("products").innerHTML = "لا يوجد منتجات";
    return;
  }

  for (var key in data) {
    var name = data[key].name || "بدون اسم";
    var price = data[key].price || "0";

    output += `
      <div style="border:1px solid #000; margin:10px; padding:10px;">
        <h3>${name}</h3>
        <p>السعر: ${price} ريال</p>
      </div>
    `;
  }

  document.getElementById("products").innerHTML = output;
});
</script>

</body>
</html>
