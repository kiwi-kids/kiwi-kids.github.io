<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Store</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #ff69b4;
    color: white;
    padding: 15px;
    text-align: center;
}

/* زر السلة */
.cart-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ff69b4;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
}

/* المنتجات */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.product {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

button {
    margin-top: 5px;
    padding: 6px;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

.edit { background: orange; }
.delete { background: red; }
.cart-btn { background: #ff69b4; }
.add-btn {
    margin: 10px;
    background: green;
    padding: 10px;
    width: 95%;
    border-radius: 8px;
}

/* السلة (مخفية) */
.cart {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    background: white;
    padding: 15px;
    border-top: 2px solid #ccc;
    transition: 0.3s;
    max-height: 60%;
    overflow-y: auto;
}

.cart.active {
    bottom: 0;
}
</style>
</head>

<body>

<header>🛒 Kiwi Kids</header>

<button class="add-btn" onclick="addProduct()">➕ إضافة منتج</button>

<div class="products" id="products"></div>

<!-- زر السلة -->
<div class="cart-toggle" onclick="toggleCart()">🛒</div>

<!-- السلة -->
<div class="cart" id="cart">
    <h3>السلة</h3>
    <div id="cart-items"></div>
    <h4 id="total">المجموع: 0 ريال</h4>
    <button onclick="sendOrder()">إرسال الطلب</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

function save() {
    localStorage.setItem("products", JSON.stringify(products));
}

function showProducts() {
    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach((p, i) => {
        container.innerHTML += `
        <div class="product">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>${p.price} ريال</p>

            <button class="cart-btn" onclick="addToCart(${i})">أضف للسلة</button>
            <button class="edit" onclick="editProduct(${i})">تعديل</button>
            <button class="delete" onclick="deleteProduct(${i})">حذف</button>
        </div>`;
    });
}

function addProduct() {
    let name = prompt("اسم المنتج:");
    let price = prompt("السعر:");

    let fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";

    fileInput.onchange = function() {
        let reader = new FileReader();
        reader.onload = function(e) {
            products.push({
                name: name,
                price: price,
                image: e.target.result
            });
            save();
            showProducts();
        };
        reader.readAsDataURL(fileInput.files[0]);
    };

    fileInput.click();
}

function editProduct(index) {
    let name = prompt("اسم جديد:", products[index].name);
    let price = prompt("سعر جديد:", products[index].price);

    let changeImage = confirm("تغيير الصورة؟");

    if (changeImage) {
        let fileInput = document.createElement("input");
        fileInput.type = "file";

        fileInput.onchange = function() {
            let reader = new FileReader();
            reader.onload = function(e) {
                products[index] = { name, price, image: e.target.result };
                save();
                showProducts();
            };
            reader.readAsDataURL(fileInput.files[0]);
        };

        fileInput.click();
    } else {
        products[index].name = name;
        products[index].price = price;
        save();
        showProducts();
    }
}

function deleteProduct(index) {
    if (confirm("متأكد؟")) {
        products.splice(index, 1);
        save();
        showProducts();
    }
}

function addToCart(index) {
    let item = cart.find(c => c.name === products[index].name);

    if (item) item.qty++;
    else cart.push({...products[index], qty:1});

    showCart();
}

function showCart() {
    let container = document.getElementById("cart-items");
    let total = 0;

    container.innerHTML = "";

    cart.forEach((item, i) => {
        total += item.price * item.qty;

        container.innerHTML += `
        <div>
            ${item.name} (${item.qty})
            <button onclick="changeQty(${i},1)">+</button>
            <button onclick="changeQty(${i},-1)">-</button>
        </div>`;
    });

    document.getElementById("total").innerText = "المجموع: " + total + " ريال";
}

function changeQty(i, change) {
    cart[i].qty += change;
    if (cart[i].qty <= 0) cart.splice(i,1);
    showCart();
}

function toggleCart() {
    document.getElementById("cart").classList.toggle("active");
}

function sendOrder() {
    if (cart.length === 0) return alert("السلة فاضية");

    let msg = "طلب جديد:%0A";
    cart.forEach(item => {
        msg += item.name + " × " + item.qty + "%0A";
    });

    window.open("https://wa.me/966537585439?text=" + msg);
}

showProducts();
</script>

</body>
</html>
