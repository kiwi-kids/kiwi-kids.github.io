<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    background: #ffb6c1;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: white;
}

.products {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin: 20px;
}

.product-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.product {
    min-width: 220px;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.main-img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* المعرض */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    text-align: center;
    padding-top: 60px;
}

.modal-img {
    max-width: 90%;
    border-radius: 10px;
}

.modal-thumbs {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.modal-thumbs img {
    width: 70px;
    height: 70px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid white;
}
</style>
</head>

<body>

<header>Kiwi Kids 👗</header>

<div class="products">

<!-- صف 1 -->
<div class="product-row">

<div class="product">
<img class="main-img" src="dress1.jpg"
onclick="openGallery(['dress1.jpg','dress2.jpg','dress3.jpg'], 'dress1.jpg')">
<h3>فستان 1</h3>
<p>150 ريال</p>
<button onclick="order()">اطلب الآن</button>
</div>

<div class="product">
<img class="main-img" src="dress2.jpg"
onclick="openGallery(['dress2.jpg','dress3.jpg','dress1.jpg'], 'dress2.jpg')">
<h3>فستان 2</h3>
<p>130 ريال</p>
<button onclick="order()">اطلب الآن</button>
</div>

<div class="product">
<img class="main-img" src="dress3.jpg"
onclick="openGallery(['dress3.jpg','dress1.jpg','dress2.jpg'], 'dress3.jpg')">
<h3>فستان 3</h3>
<p>170 ريال</p>
<button onclick="order()">اطلب الآن</button>
</div>

</div>

</div>

<!-- نافذة الصور -->
<div id="galleryModal" class="modal">
<span onclick="closeGallery()" style="color:white;font-size:30px;position:absolute;top:20px;right:30px;cursor:pointer;">✕</span>

<img id="modalMain" class="modal-img">

<div class="modal-thumbs" id="modalThumbs"></div>
</div>

<script>
function order() {
    window.open("https://wa.me/966537585439");
}

function openGallery(images, current) {
    document.getElementById("galleryModal").style.display = "block";

    let main = document.getElementById("modalMain");
    let thumbs = document.getElementById("modalThumbs");

    main.src = current;
    thumbs.innerHTML = "";

    images.forEach(img => {
        let el = document.createElement("img");
        el.src = img;
        el.onclick = () => main.src = img;
        thumbs.appendChild(el);
    });
}

function closeGallery() {
    document.getElementById("galleryModal").style.display = "none";
}
</script>

</body>
</html>
