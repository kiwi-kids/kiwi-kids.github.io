<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    background: #ff69b4;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: white;
}

.products {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin: 15px;
}

.product-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.product {
    min-width: 200px;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.main-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.gallery {
    display: flex;
    gap: 5px;
    margin-top: 8px;
}

.gallery img {
    width: 55px;
    height: 55px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
}

.gallery img.active {
    border: 2px solid #ff69b4;
}

button {
    background: #ff69b4;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>Kiwi Kids 👗</header>

<div class="products">

<div class="product-row">

<div class="product">
<img id="m1" class="main-img" src="https://i.imgur.com/3ZQ3Z6G.jpg">
<h3>فستان 1</h3>
<p>150 ريال</p>

<div class="gallery">
<img src="https://i.imgur.com/3ZQ3Z6G.jpg" class="active" onclick="changeImage('m1', this)">
<img src="https://i.imgur.com/5tj6S7O.jpg" onclick="changeImage('m1', this)">
<img src="https://i.imgur.com/V4RclNb.jpg" onclick="changeImage('m1', this)">
</div>

<button onclick="order('فستان 1')">اطلب الآن</button>
</div>

<div class="product">
<img id="m2" class="main-img" src="https://i.imgur.com/5tj6S7O.jpg">
<h3>فستان 2</h3>
<p>130 ريال</p>

<div class="gallery">
<img src="https://i.imgur.com/5tj6S7O.jpg" class="active" onclick="changeImage('m2', this)">
<img src="https://i.imgur.com/V4RclNb.jpg" onclick="changeImage('m2', this)">
<img src="https://i.imgur.com/3ZQ3Z6G.jpg" onclick="changeImage('m2', this)">
</div>

<button onclick="order('فستان 2')">اطلب الآن</button>
</div>

</div>

</div>

<script>
function order(product) {
    let message = "أبغى أطلب: " + product;
    window.open("https://wa.me/966537585439?text=" + encodeURIComponent(message));
}

function changeImage(id, el) {
    document.getElementById(id).src = el.src;

    let images = el.parentElement.querySelectorAll("img");
    images.forEach(img => img.classList.remove("active"));

    el.classList.add("active");
}
</script>

</body>
</html>
