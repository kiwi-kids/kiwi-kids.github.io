<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Ultimate</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6fb;
    text-align:center;
}

/* الهيدر */
header{
    background:linear-gradient(135deg,#ff6a88,#ff99ac);
    color:white;
    padding:15px;
}

/* تسجيل الدخول */
#loginBox{
    width:260px;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px #ddd;
}

/* لوحة الأدمن */
#admin{
    display:none;
    background:white;
    margin:10px;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 10px #ddd;
}

input{
    width:90%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

/* المنتجات */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:180px;
    background:white;
    margin:10px;
    padding:10px;
    border-radius:15px;
    box-shadow:0 0 10px #ddd;
}

.card img{
    width:100%;
    border-radius:10px;
}

button{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add{background:#ff69b4;color:white}
.del{background:red;color:white}
.cartBtn{background:#4facfe;color:white}

/* السلة */
#cartBox{
    position:fixed;
    bottom:10px;
    left:10px;
    width:240px;
    background:white;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 10px #ccc;
    font-size:13px;
}

/* واتساب */
.whatsapp{
    position:fixed;
    bottom:10px;
    right:10px;
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:50px;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h2>Kiwi Kids Ultimate 🥝</h2>
</header>

<!-- تسجيل دخول -->
<div id="loginBox">
<h3>دخول الأدمن</h3>
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()" style="background:green;color:white;">دخول</button>
</div>

<!-- لوحة الأدمن -->
<div id="admin">
<h3>إدارة المنتجات</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="الصورة">
<button onclick="addProduct()" style="background:green;color:white;">إضافة</button>
</div>

<!-- المنتجات -->
<div class="products" id="products"></div>

<!-- السلة -->
<div id="cartBox">
<b>🛒 السلة</b>
<div id="cart"></div>
<p>الإجمالي: <span id="total">0</span> ريال</p>
<button onclick="checkout()" style="background:orange;color:white;">إتمام الطلب</button>
</div>

<!-- واتساب -->
<a class="whatsapp" onclick="checkout()">واتساب 📱</a>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"فستان بناتي", price:180, img:"dress1.jpg"},
    {name:"فستان فراشة", price:120, img:"dress2.jpg"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* تسجيل دخول */
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("admin").style.display="block";
    }else{
        alert("خطأ");
    }
}

/* عرض المنتجات */
function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <p>${p.price} ريال</p>
            <button class="add" onclick="addCart(${i})">إضافة</button>
            <button class="del" onclick="del(${i})">حذف</button>
        </div>`;
    });
    document.getElementById("products").innerHTML=html;
}

/* حذف منتج */
function del(i){
    products.splice(i,1);
    save();
    render();
}

/* إضافة منتج */
function addProduct(){
    products.push({
        name:document.getElementById("name").value,
        price:document.getElementById("price").value,
        img:document.getElementById("img").value
    });
    save();
    render();
}

/* سلة */
function addCart(i){
    let item = products[i];

    let found = cart.find(c=>c.name===item.name);
    if(found){
        found.qty++;
    }else{
        cart.push({...item, qty:1});
    }

    save();
    renderCart();
}

/* حذف من السلة */
function remove(i){
    cart.splice(i,1);
    save();
    renderCart();
}

/* عرض السلة */
function renderCart(){
    let html="";
    let total=0;

    cart.forEach((c,i)=>{
        html+=`
        ${c.name} x${c.qty} = ${c.price*c.qty}
        <button onclick="remove(${i})" style="background:red;color:white;">X</button><br>`;
        total+=c.price*c.qty;
    });

    document.getElementById("cart").innerHTML=html;
    document.getElementById("total").innerText=total;
}

/* حفظ */
function save(){
    localStorage.setItem("products",JSON.stringify(products));
    localStorage.setItem("cart",JSON.stringify(cart));
}

/* واتساب */
function checkout(){
    let phone="966537585439";
    let msg="طلب جديد:%0A";

    cart.forEach(c=>{
        msg+=`${c.name} x${c.qty} = ${c.price*c.qty}%0A`;
    });

    window.open("https://wa.me/"+phone+"?text="+msg);
}

render();
renderCart();

</script>

</body>
</html>
