<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Pro Fix</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f5f5;
}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* الشبكة */
.grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:10px;
padding:10px;
}

/* كرت */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
margin:5px;
}

/* زر */
button{
background:#4CAF50;
color:white;
border:none;
padding:6px;
width:90%;
margin-bottom:8px;
border-radius:6px;
cursor:pointer;
}

/* 🔥 السلة (Fixed صح) */
.cart{
position:fixed;
left:0;
top:0;
width:280px;
height:100%;
background:white;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
padding:15px;
transform:translateX(-100%);
transition:0.3s;
z-index:999;
overflow:auto;
}

.cart.open{
transform:translateX(0);
}

.item{
border-bottom:1px solid #ddd;
padding:5px;
font-size:14px;
}

.total{
font-weight:bold;
margin-top:10px;
}

.whatsapp{
background:#25D366;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div onclick="toggleCart()">🛒</div>
</header>

<!-- السلة -->
<div class="cart" id="cart">
<h3>السلة</h3>
<div id="items"></div>
<div class="total" id="total">الإجمالي: 0</div>
<button class="whatsapp" onclick="order()">اطلب واتساب</button>
</div>

<!-- المنتجات -->
<div class="grid" id="grid"></div>

<script>

/* منتجات */
const products=[
{ name:"فستان أطفال", price:60, img:"https://via.placeholder.com/300" },
{ name:"فستان بناتي", price:80, img:"https://via.placeholder.com/300" },
{ name:"فستان سهرة", price:150, img:"https://via.placeholder.com/300" },
{ name:"طقم أطفال", price:90, img:"https://via.placeholder.com/300" },
{ name:"عباية بناتي", price:70, img:"https://via.placeholder.com/300" },
{ name:"فستان مناسبات", price:120, img:"https://via.placeholder.com/300" }
];

let cart=[];
let total=0;

/* تحميل المنتجات */
function load(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach(p=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price} ريال</div>
<button onclick="add('${p.name}',${p.price})">أضف للسلة</button>
</div>
`;
});
}

/* إضافة للسلة */
function add(name,price){
cart.push({name,price});
render();
}

/* عرض السلة */
function render(){
let box=document.getElementById("items");
box.innerHTML="";
total=0;

cart.forEach(c=>{
box.innerHTML+=`<div class="item">${c.name} - ${c.price} ريال</div>`;
total+=c.price;
});

document.getElementById("total").innerText="الإجمالي: "+total;
}

/* فتح/إغلاق السلة */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* طلب واتساب */
function order(){
let msg="طلب جديد:%0A";
cart.forEach(c=>{
msg+=c.name+" - "+c.price+" ريال%0A";
});
msg+="الإجمالي: "+total;

window.open("https://wa.me/966500000000?text="+msg);
}

load();

</script>

</body>
</html>
