<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

/* 🔥 الهيدر المتحرك */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  padding:12px 15px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  animation:slideDown 0.6s ease;
}

@keyframes slideDown{
  from{transform:translateY(-100%)}
  to{transform:translateY(0)}
}

/* 🛒 زر السلة */
.cart{
  position:relative;
  cursor:pointer;
  animation:pop 1s infinite alternate;
}

@keyframes pop{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

.cart span{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  font-size:12px;
  padding:2px 6px;
  border-radius:50%;
}

/* 📦 المنتجات */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

/* 🧊 كرت المنتج */
.product{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
  animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 🔥 Hover قوي */
.product:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* صورة المنتج */
.product img{
  width:100%;
  height:170px;
  object-fit:cover;
  transition:0.3s;
}

.product:hover img{
  transform:scale(1.05);
}

/* المحتوى */
.info{
  padding:10px;
}

.price{
  color:#00b894;
  font-weight:bold;
}

/* زر */
button{
  width:100%;
  padding:8px;
  border:none;
  background:linear-gradient(135deg,#00b894,#00cec9);
  color:white;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(0,184,148,0.4);
}

/* 🛒 السلة */
.cartBox{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:white;
  padding:15px;
  border-radius:25px 25px 0 0;
  box-shadow:0 -10px 30px rgba(0,0,0,0.2);
  transition:0.4s cubic-bezier(.25,.8,.25,1);
}

.cartBox.active{
  bottom:0;
}
</style>
