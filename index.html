<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwi Kids Store</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#ff69b4;
    color:#fff;
    padding:15px;
    text-align:center;
}

/* المنتجات */
.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.product{
    background:#fff;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.product img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

button{
    margin-top:5px;
    padding:6px;
    border:none;
    border-radius:6px;
    color:#fff;
    cursor:pointer;
}

.cart-btn{background:#ff69b4;}

/* زر السلة */
.cart-icon{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff69b4;
    color:#fff;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}

/* خلفية */
.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
}

/* السلة الجانبية */
.cart{
    position:fixed;
    top:0;
    right:-320px;
    width:300px;
    height:100%;
    background:#fff;
    padding:15px;
    transition:0.3s;
    overflow-y:auto;
}

.cart.active{
    right:0;
}

.overlay.active{
    display:block;
}
</style>
</head>

<body>

<header>🛒 Kiwi Kids</header>

<div class="products" id="products"></div>

<div class="cart-icon" onclick="toggleCart()">🛒</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
    <h3>السلة</h3>
    <div id="cart-items"></div>
    <h4 id="total">المجموع: 0 ريال</h4>
    <button style="background:#ff69b4;width:100%;" onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"فستان 1", price:150, image:"https://i.imgur.com/3ZQ3Z6G.jpg"},
    {name:"فستان 2", price:130, image:"https://i.imgur.com/5tj6S7O.jpg"},
    {name:"فستان 3", price:170, image:"https://i.imgur.com/V4RclNb.jpg"}
];

let cart = [];

function showProducts(){
    let c = document.getElementById("products");
    c.innerHTML = "";

    products.forEach((p,i)=>{
        c.innerHTML += `
        <div class="product">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>${p.price} ريال</p>
            <button class="cart-btn" onclick="addToCart(${i})">أضف للسلة</button>
        </div>`;
    });
}

function addToCart(i){
    let item = cart.find(c=>c.name===products[i].name);

    if(item) item.qty++;
    else cart.push({...products[i], qty:1});

    showCart();
}

function showCart(){
    let c = document.getElementById("cart-items");
    let total = 0;
    c.innerHTML = "";

    cart.forEach((item,i)=>{
        total += item.price * item.qty;

        c.innerHTML += `
        <div style="margin-bottom:10px;">
            ${item.name} (${item.qty})
            <div>
                <button onclick="changeQty(${i},1)" style="background:green;">+</button>
                <button onclick="changeQty(${i},-1)" style="background:red;">-</button>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText = "المجموع: " + total + " ريال";
}

function changeQty(i,val){
    cart[i].qty += val;
    if(cart[i].qty<=0) cart.splice(i,1);
    showCart();
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function sendOrder(){
    if(cart.length===0) return alert("السلة فاضية");

    let msg = "طلب جديد:%0A";

    cart.forEach(i=>{
        msg += i.name + " × " + i.qty + "%0A";
    });

    window.open("https://wa.me/966537585439?text="+msg);
}

showProducts();
</script>

</body>
</html>
