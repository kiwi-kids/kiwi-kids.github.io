<!DOCTYPE html>
<html>
<head>
<title>Kiwi Kids</title>
<style>
body {font-family:Arial; text-align:center;}
.login-box {margin-top:50px;}
input {padding:10px; margin:5px;}
button {padding:10px 20px; background:green; color:white; border:none;}
#adminPage {display:none;}
</style>
</head>

<body>

<h1>Kiwi Kids</h1>

<div class="login-box">
<h2>دخول الأدمن</h2>
<input type="text" id="user" placeholder="اسم المستخدم"><br>
<input type="password" id="pass" placeholder="كلمة المرور"><br>
<button onclick="login()">دخول</button>
</div>

<div id="adminPage">
<h2>لوحة التحكم</h2>
<p>تم تسجيل الدخول بنجاح ✅</p>
<button onclick="addProduct()">إضافة منتج</button>
</div>

<script>
function login(){
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    document.querySelector(".login-box").style.display="none";
    document.getElementById("adminPage").style.display="block";
  } else {
    alert("بيانات غلط ❌");
  }
}

function addProduct(){
  alert("هنا تضيف منتجات 👍");
}
</script>

</body>
</html>
