<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kiwi Kids</title>

<style>
body {font-family:Arial; margin:0; direction:rtl; background:#f5f5f5;}

/* الهيدر */
header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* زر الثلاث خطوط */
.menu-btn{
font-size:26px;
cursor:pointer;
}

/* القائمة الجانبية */
.sidebar{
position:fixed;
top:0;
right:-250px;
width:250px;
height:100%;
background:white;
box-shadow:-2px 0 5px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
}

.sidebar div{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

/* المنتجات */
.products{
padding:20px;
}

.product{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>Kiwi Kids 🛍️</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- القائمة -->
<div class="sidebar" id="sidebar">

<div onclick="showSection('home')">🏠 الرئيسي</div>
<div onclick="showSection('dresses')">👗 فساتين</div>
<div onclick="showSection('evening')">🌙 فساتين سهرة</div>

</div>

<!-- المحتوى -->
<div class="products" id="content">

<h2>أهلاً بك في المتجر 👋</h2>
<p>اختر قسم من القائمة</p>

</div>

<script>

// فتح وإغلاق القائمة
function toggleMenu(){
let s = document.getElementById("sidebar");
if(s.style.right=="0px"){
s.style.right="-250px";
}else{
s.style.right="0px";
}
}

// عرض الأقسام
function showSection(section){

let c = document.getElementById("content");

if(section==="home"){
c.innerHTML = "<h2>🏠 الرئيسي</h2><p>كل المنتجات العامة</p>";
}

if(section==="dresses"){
c.innerHTML = `
<h2>👗 فساتين</h2>
<div class="product">فستان بناتي - 80 ريال</div>
<div class="product">فستان أطفال - 60 ريال</div>
`;
}

if(section==="evening"){
c.innerHTML = `
<h2>🌙 فساتين سهرة</h2>
<div class="product">فستان سهرة فاخر - 150 ريال</div>
<div class="product">فستان مناسبات - 120 ريال</div>
`;
}

// إغلاق القائمة بعد الاختيار
document.getElementById("sidebar").style.right="-250px";
}

</script>

</body>
</html>
